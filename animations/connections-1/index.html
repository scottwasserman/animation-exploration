<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connections 1 — Portraits of Me</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="overlay">
      <h1>Connections 1</h1>
      <p>Green links form and fade red before breaking. Drag to explore. Reset bottom-right.</p>
    </div>
    <button
      id="reset-grid"
      class="reset-grid"
      type="button"
      aria-label="Reset grid"
    >
      <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
        <path
          d="M4 7V4h3M4 4l4 4"
          fill="none"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
        <path
          d="M20 17v3h-3M20 20l-4-4"
          fill="none"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
        <path
          d="M7 20A8 8 0 0118.3 6.3M17 4A8 8 0 015.7 17.7"
          fill="none"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
        />
      </svg>
    </button>
    <script type="module" src="./main.js"></script>
  </body>
</html>
