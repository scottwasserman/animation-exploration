<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Model Loader — Portraits of Me</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="overlay">
      <h1>Model Loader</h1>
      <p>3D scanned face. Drag to rotate, shift+drag to move, scroll to zoom. Drop another model to replace it.</p>
    </div>
    <div id="status" class="status" aria-live="polite"></div>
    <label class="load-button" for="model-input">
      Load model
      <input
        id="model-input"
        type="file"
        accept=".glb,.gltf,.obj"
        hidden
      />
    </label>
    <script type="module" src="./main.js"></script>
  </body>
</html>
